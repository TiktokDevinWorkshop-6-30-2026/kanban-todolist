<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-card" id="appCard">
        <header class="app-header">
            <div class="logo"><span class="todo-text">Daily</span> <span class="list-text">Task</span> <span class="accent-text">Tracker</span></div>
            <div class="header-controls">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search tasks...">
                </div>
                <select id="priorityFilter" class="select-filter">
                    <option value="all" selected>All Priorities</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <select id="sortBySelect" class="select-filter">
                    <option value="date-desc" selected>Newest First</option>
                    <option value="date-asc">Oldest First</option>
                    <option value="priority-desc">Highest Priority</option>
                    <option value="title-asc">Title A-Z</option>
                </select>
            </div>
        </header>

        <section class="add-todo-wrapper">
            <div class="add-todo-card" id="addTodoCard">
                <div class="add-todo-main-row">
                    <input type="text" id="todoTitleInput" class="title-input-field" placeholder="Add a new todo task..." minlength="3" maxlength="40">
                    <div class="row-right-group">
                        <span id="titleCounter" class="char-counter">40 left</span>
                        <div class="priority-select-wrapper">
                            <label for="todoPriorityInput">Priority:</label>
                            <select id="todoPriorityInput" class="select-filter" style="padding: 4px 6px;">
                                <option value="low" selected>Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <button id="addTodoBtn" class="btn-add-submit"><i class="fas fa-plus"></i> Add</button>
                    </div>
                </div>
                <div class="add-todo-desc-row">
                    <textarea id="todoDescInput" class="desc-textarea-field" placeholder="Add description (optional)..." maxlength="150"></textarea>
                    <div id="descCounter" class="desc-char-counter">150 left</div>
                </div>
            </div>
        </section>

        <main class="board-container">
            <section class="board-column" id="columnTodo" data-column="todo">
                <header class="column-header">
                    <div class="column-title-group"><span class="column-dot todo"></span><h3>To Do</h3></div>
                    <span class="column-count" id="countTodo">0</span>
                </header>
                <div class="column-body no-scrollbar" id="bodyTodo"></div>
            </section>
            <section class="board-column" id="columnProgress" data-column="progress">
                <header class="column-header">
                    <div class="column-title-group"><span class="column-dot progress"></span><h3>In Progress</h3></div>
                    <span class="column-count" id="countProgress">0</span>
                </header>
                <div class="column-body no-scrollbar" id="bodyProgress"></div>
            </section>
            <section class="board-column col-done" id="columnDone" data-column="done">
                <header class="column-header">
                    <div class="column-title-group"><span class="column-dot done"></span><h3>Done</h3></div>
                    <span class="column-count" id="countDone">0</span>
                </header>
                <div class="column-body no-scrollbar" id="bodyDone"></div>
            </section>
        </main>
    </div>

    <!-- Task Edit/View Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal-dialog">
            <div class="modal-header">
                <h2 id="taskModalTitle">Edit Task</h2>
                <button class="modal-close" onclick="closeModal('taskModal')">&times;</button>
            </div>
            <div class="modal-body">
                <label class="modal-label" for="taskTitleInput">Title</label>
                <input type="text" id="taskTitleInput" class="modal-input" maxlength="40">
                <div class="modal-char-counter" id="taskTitleCounter">40 left</div>

                <label class="modal-label" for="taskPriorityInput">Priority</label>
                <select id="taskPriorityInput" class="modal-select">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>

                <label class="modal-label" for="taskDescInput">Description</label>
                <textarea id="taskDescInput" class="modal-textarea" maxlength="150" rows="3"></textarea>
                <div class="modal-char-counter" id="taskDescCounter">150 left</div>

                <div class="modal-timestamps">
                    <div class="timestamp-row"><i class="fas fa-clock"></i> Created: <span id="taskCreated"></span></div>
                    <div class="timestamp-row"><i class="fas fa-pencil-alt"></i> Last edited: <span id="taskEdited"></span></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-delete" onclick="if(editingTaskId) deleteTask(editingTaskId).then(function(){closeModal('taskModal');})"><i class="fas fa-trash-alt"></i> Delete</button>
                <div class="modal-footer-right">
                    <button class="btn-modal-cancel" onclick="closeModal('taskModal')">Cancel</button>
                    <button class="btn-modal-save" id="saveEditBtn"><i class="fas fa-check"></i> Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-dialog modal-sm">
            <div class="modal-header">
                <h2 id="confirmModalTitle">Confirm</h2>
                <button class="modal-close" id="confirmCloseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirmModalMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" id="confirmCancelBtn">Cancel</button>
                <button class="btn-modal-delete" id="confirmYesBtn"><i class="fas fa-trash-alt"></i> Delete</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/state.js"></script>
    <script src="js/render.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/events.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
